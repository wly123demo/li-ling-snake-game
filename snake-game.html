<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李玲的贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    user-select: none;
  }

  .game-wrapper {
    text-align: center;
  }

  h1 {
    color: #4ecca3;
    font-size: 2.2rem;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 600px;
    margin: 0 auto 10px;
    padding: 0 6px;
  }

  .score-box, .best-box {
    color: #eee;
    font-size: 1.1rem;
    background: #16213e;
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid #0f3460;
  }

  .score-box span, .best-box span {
    color: #4ecca3;
    font-weight: bold;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border: 3px solid #0f3460;
    border-radius: 8px;
    background: #16213e;
    box-shadow: 0 0 30px rgba(78, 204, 163, 0.15);
  }

  .controls {
    margin-top: 16px;
    color: #666;
    font-size: 0.9rem;
  }

  .controls kbd {
    display: inline-block;
    background: #16213e;
    color: #4ecca3;
    border: 1px solid #0f3460;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 0.85rem;
    margin: 0 2px;
  }

  .game-over-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .game-over-overlay.show {
    display: flex;
  }

  .game-over-dialog {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 0 40px rgba(78, 204, 163, 0.2);
  }

  .game-over-dialog h2 {
    color: #e74c3c;
    font-size: 2rem;
    margin-bottom: 12px;
  }

  .game-over-dialog .final-score {
    color: #eee;
    font-size: 2rem;
    margin-bottom: 20px;
  }

  .game-over-dialog .final-score b {
    color: #4ecca3;
    font-size: 1.6rem;
  }

  .game-over-dialog button {
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    padding: 10px 32px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .game-over-dialog button:hover {
    background: #3db88d;
    transform: scale(1.05);
  }

  .game-over-dialog button:active {
    transform: scale(0.97);
  }

  /* 移动端方向键 */
  .mobile-controls {
    display: none;
    margin-top: 12px;
  }

  .dpad-row {
    display: flex;
    justify-content: center;
    gap: 55px;
  }

  .dpad-btn {
    width: 55px;
    height: 55px;
    font-size: 1.5rem;
    border: 2px solid #0f3460;
    border-radius: 12px;
    background: #16213e;
    color: #4ecca3;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.1s;
  }

  .dpad-btn:active {
    background: #0f3460;
  }

  @media (max-width: 620px) {
    canvas { width: 320px; height: 320px; }
    .info-bar { width: 320px; }
    .mobile-controls { display: block; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <h1>🐍 李玲的贪吃蛇</h1>

  <div class="info-bar">
    <div class="score-box">🍎 分数 <span id="score">0</span></div>
    <div class="best-box">🏆 最高 <span id="best">0</span></div>
  </div>

  <canvas id="canvas" width="600" height="600"></canvas>

  <div class="controls">
    <kbd>↑ ↓ ← →</kbd> 或 <kbd>W A S D</kbd> 控制方向 &nbsp;|&nbsp;
    <kbd>Space</kbd> 暂停 &nbsp;|&nbsp;
    <kbd>R</kbd> 重新开始
  </div>

  <div class="mobile-controls">
    <div class="dpad-row">
      <button class="dpad-btn" id="btn-up">▲</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="btn-left">◀</button>
      <button class="dpad-btn" id="btn-down">▼</button>
      <button class="dpad-btn" id="btn-right">▶</button>
    </div>
  </div>
</div>

<div class="game-over-overlay" id="overlay">
  <div class="game-over-dialog">
    <h2>游戏结束</h2>
    <p class="final-score">最终得分 <b id="final-score">0</b></p>
    <button id="restart-btn">🔄 再来一局</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const GRID = 30;          // 网格大小
  const COLS = canvas.width / GRID;   // 20
  const ROWS = canvas.height / GRID;  // 20

  // 状态
  let snake, direction, nextDirection;
  let food, score, bestScore;
  let gameLoop, running, paused;
  let speed = 100;          // ms per tick

  // DOM
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('final-score');
  const restartBtn = document.getElementById('restart-btn');

  // 从 localStorage 读取最高分
  bestScore = parseInt(localStorage.getItem('snake-best') || '0');
  bestEl.textContent = bestScore;

  function randomFood() {
    while (true) {
      const fx = Math.floor(Math.random() * COLS);
      const fy = Math.floor(Math.random() * ROWS);
      if (!snake.some(s => s.x === fx && s.y === fy)) {
        return { x: fx, y: fy };
      }
    }
  }

  function init() {
    // 蛇从中间开始，初始长度 3
    const mx = Math.floor(COLS / 2);
    const my = Math.floor(ROWS / 2);
    snake = [
      { x: mx, y: my },
      { x: mx - 1, y: my },
      { x: mx - 2, y: my },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    paused = false;
    speed = 100;
    food = randomFood();
    updateScore();
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('snake-best', bestScore);
      bestEl.textContent = bestScore;
    }
  }

  function tick() {
    if (!running || paused) return;

    // 应用方向
    direction = { ...nextDirection };

    // 计算新头部
    const head = snake[0];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };

    // 撞墙检测
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      return gameOver();
    }

    // 撞自己检测（排除尾部，因为尾部即将移除）
    const willGrow = (newHead.x === food.x && newHead.y === food.y);
    const checkBody = willGrow ? snake : snake.slice(0, -1);
    if (checkBody.some(s => s.x === newHead.x && s.y === newHead.y)) {
      return gameOver();
    }

    // 移动
    snake.unshift(newHead);

    if (willGrow) {
      score += 10;
      updateScore();
      food = randomFood();
      // 加速：每吃 5 个食物加速一次
      if (score % 50 === 0 && speed > 40) {
        speed -= 5;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    // 清屏
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 画网格线（淡）
    ctx.strokeStyle = 'rgba(15, 52, 96, 0.3)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * GRID, 0);
      ctx.lineTo(x * GRID, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * GRID);
      ctx.lineTo(canvas.width, y * GRID);
      ctx.stroke();
    }

    // 画食物
    const fx = food.x * GRID, fy = food.y * GRID;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(fx + GRID / 2, fy + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    // 食物高光
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(fx + GRID / 2 - 5, fy + GRID / 2 - 5, GRID / 6, 0, Math.PI * 2);
    ctx.fill();

    // 画蛇
    snake.forEach((seg, i) => {
      const sx = seg.x * GRID, sy = seg.y * GRID;
      const pad = 1;

      if (i === 0) {
        // 蛇头
        ctx.fillStyle = '#4ecca3';
        ctx.fillRect(sx + pad, sy + pad, GRID - pad * 2, GRID - pad * 2);
        // 眼睛
        const eyeR = 4;
        const cx = sx + GRID / 2, cy = sy + GRID / 2;
        let ex1, ey1, ex2, ey2;
        if (direction.x === 1)      { ex1 = cx + 6; ey1 = cy - 6; ex2 = cx + 6; ey2 = cy + 6; }
        else if (direction.x === -1) { ex1 = cx - 6; ey1 = cy - 6; ex2 = cx - 6; ey2 = cy + 6; }
        else if (direction.y === -1) { ex1 = cx - 6; ey1 = cy - 6; ex2 = cx + 6; ey2 = cy - 6; }
        else                        { ex1 = cx - 6; ey1 = cy + 6; ex2 = cx + 6; ey2 = cy + 6; }
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#16213e';
        ctx.beginPath();
        ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // 蛇身：渐变色
        const ratio = i / Math.max(snake.length - 1, 1);
        const r = Math.floor(30 + ratio * 20);
        const g = Math.floor(180 - ratio * 60);
        const b = Math.floor(120 + ratio * 40);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(sx + pad, sy + pad, GRID - pad * 2, GRID - pad * 2);
      }
    });

    // 暂停提示
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#eee';
      ctx.font = 'bold 38px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'start';
    }
  }

  function gameOver() {
    running = false;
    clearInterval(gameLoop);
    finalScoreEl.textContent = score;
    overlay.classList.add('show');
  }

  function startGame() {
    clearInterval(gameLoop);
    overlay.classList.remove('show');
    init();
    running = true;
    draw();
    gameLoop = setInterval(tick, speed);
  }

  // 键盘控制
  document.addEventListener('keydown', (e) => {
    // 阻止方向键和空格滚动页面
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Space','KeyW','KeyA','KeyS','KeyD','KeyR'].includes(e.code)) {
      e.preventDefault();
    }

    switch (e.code) {
      case 'ArrowUp': case 'KeyW':
        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        break;
      case 'ArrowDown': case 'KeyS':
        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        break;
      case 'ArrowLeft': case 'KeyA':
        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        break;
      case 'ArrowRight': case 'KeyD':
        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        break;
      case 'Space':
        if (running) {
          paused = !paused;
          draw();
        }
        break;
      case 'KeyR':
        startGame();
        break;
    }
  });

  // 移动端按钮
  document.getElementById('btn-up').addEventListener('click', () => {
    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
  });
  document.getElementById('btn-down').addEventListener('click', () => {
    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
  });
  document.getElementById('btn-left').addEventListener('click', () => {
    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
  });
  document.getElementById('btn-right').addEventListener('click', () => {
    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
  });
  // 阻止移动端按钮的双击缩放
  document.querySelectorAll('.dpad-btn').forEach(b => {
    b.addEventListener('touchstart', (e) => { e.preventDefault(); b.click(); });
  });

  // 重新开始按钮
  restartBtn.addEventListener('click', startGame);
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) startGame();
  });

  // 启动
  startGame();
})();
</script>
</body>
</html>
